version: "3.9"

services:
  # ─────────────────────────────────────────
  # ClinicCRM – Frontend (React + Vite)
  # ─────────────────────────────────────────
  cliniccrm:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: cliniccrm-app
    restart: unless-stopped
    ports:
      - "3000:80"          # Acesse pelo navegador em http://localhost:3000
    environment:
      - NODE_ENV=production
    networks:
      - cliniccrm-network

  # ─────────────────────────────────────────
  # NGINX Reverse Proxy (opcional para VPS)
  # ─────────────────────────────────────────
  # nginx-proxy:
  #   image: jc21/nginx-proxy-manager:latest
  #   container_name: nginx-proxy-manager
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #     - "81:81"          # Painel admin do proxy
  #   volumes:
  #     - npm-data:/data
  #     - npm-letsencrypt:/etc/letsencrypt
  #   networks:
  #     - cliniccrm-network

networks:
  cliniccrm-network:
    driver: bridge

